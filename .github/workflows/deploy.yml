name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: quartz/package-lock.json

      - name: Install Quartz dependencies
        run: npm ci
        working-directory: quartz

      - name: Build Quartz site
        run: npx quartz build -o ../quartz-output
        working-directory: quartz

      - name: Prepare deployment artifact
        run: |
          mkdir -p _site
          # Copy main site (everything except quartz source, node_modules, etc.)
          rsync -a --exclude=quartz --exclude=_site --exclude=quartz-output --exclude=.git . _site/
          # Copy built Quartz output (docs/, blog/, static assets) into site
          cp -r quartz-output/* _site/
          # Restore main site index.html over Quartz-generated one
          cp index.html _site/index.html

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
